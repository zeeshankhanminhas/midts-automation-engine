<style>
  :root {
    color-scheme: light;
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-soft: #eef3f6;
    --border: #d9e0e5;
    --text: #182127;
    --muted: #66737c;
    --accent: #0f7b6c;
    --accent-dark: #095b50;
    --warning: #a35d00;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    line-height: 1.45;
  }

  button, input, textarea {
    font: inherit;
  }

  .shell {
    width: min(1440px, 100%);
    margin: 0 auto;
    padding: 20px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 0 18px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
  }

  h1, h2, h3, p { margin: 0; }

  h1 { font-size: 28px; font-weight: 700; }
  h2 { font-size: 16px; font-weight: 700; }
  h3 { margin: 18px 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; }

  .icon-button, .primary, .tab {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }

  .icon-button {
    min-width: 92px;
    height: 36px;
  }

  .primary {
    width: 100%;
    height: 40px;
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  .primary:disabled, .icon-button:disabled {
    cursor: wait;
    opacity: 0.65;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(8, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .metric {
    min-height: 78px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
  }

  .metric span {
    display: block;
    min-height: 18px;
    color: var(--muted);
    font-size: 12px;
  }

  .metric strong {
    display: block;
    margin-top: 8px;
    font-size: 26px;
  }

  .workspace {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    align-items: start;
  }

  .panel, .tables {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow);
  }

  .panel { padding: 14px; }

  .panel-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }

  #formStatus {
    min-height: 18px;
    color: var(--muted);
    font-size: 12px;
    text-align: right;
  }

  form { display: grid; gap: 10px; }

  label span {
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 12px;
  }

  input, textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    background: #fff;
    color: var(--text);
  }

  textarea { resize: vertical; }

  .tables { overflow: hidden; }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-soft);
    overflow-x: auto;
  }

  .tab {
    min-width: 82px;
    height: 34px;
    padding: 0 12px;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .table-wrap {
    display: none;
    width: 100%;
    overflow-x: auto;
  }

  .table-wrap.active { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 720px;
  }

  th, td {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    vertical-align: top;
    white-space: nowrap;
  }

  th {
    background: #fbfcfd;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  td.empty {
    color: var(--muted);
  }

  .logs-view { padding-bottom: 12px; }
  .logs-view h3 { padding-left: 12px; }

  .statusline {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    min-height: 28px;
    padding-top: 10px;
    color: var(--muted);
    font-size: 12px;
  }

  .error { color: #b42318; }
  .ok { color: var(--accent-dark); }

  @media (max-width: 1100px) {
    .metrics { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
    .workspace { grid-template-columns: 1fr; }
  }

  @media (max-width: 620px) {
    .shell { padding: 12px; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .metrics { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    h1 { font-size: 23px; }
    .metric strong { font-size: 22px; }
  }
</style>
